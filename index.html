<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NaN0Hornet WebComms</title>
    <style>
        body {
            background-color: #151A02;
            color: #D5DE10;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .container {
            background-color: #23280F;
            border: 2px solid #D5DE10;
            border-radius: 15px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 15px rgba(213, 222, 16, 0.2);
        }

        h2 { margin-top: 0; border-bottom: 1px solid #D5DE10; padding-bottom: 10px; }

        .freq-control {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            background: #111;
            padding: 10px;
            border-radius: 10px;
        }

        .btn-freq {
            background-color: #444;
            color: #D5DE10;
            border: none;
            border-radius: 5px;
            width: 40px;
            height: 40px;
            font-size: 24px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-freq:active { background-color: #D5DE10; color: #111; }

        .freq-display {
            font-size: 28px;
            color: #32ffff;
            margin: 0 15px;
            font-weight: bold;
        }

        .users-badge {
            background-color: #32ffff;
            color: #111;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            display: inline-block;
        }

        canvas {
            width: 100%;
            height: 100px;
            background-color: #0A0F05;
            border-radius: 8px;
            border: 1px solid #555;
            margin-bottom: 20px;
        }

        .ptt-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #444;
            border: 4px solid #D5DE10;
            color: #D5DE10;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            transition: all 0.1s ease;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        .ptt-btn.tx-active {
            background-color: #ff3232;
            border-color: #ff9696;
            color: white;
            box-shadow: 0 0 20px rgba(255, 50, 50, 0.8), inset 0 0 20px rgba(0,0,0,0.5);
        }

        .ptt-btn.rx-active {
            background-color: #32ff32;
            border-color: #96ff96;
            color: #000;
            box-shadow: 0 0 20px rgba(50, 255, 50, 0.8), inset 0 0 20px rgba(0,0,0,0.5);
        }

        .status { margin-top: 15px; font-size: 14px; color: #D3D4CB; }
    </style>
</head>
<body>

<div class="container">
    <h2>Global WebComms</h2>
    
    <div class="users-badge" id="usersLabel">Buscando usuarios...</div>

    <div class="freq-control">
        <button class="btn-freq" id="btnDown">-</button>
        <div class="freq-display" id="freqLabel">462.550 MHz</div>
        <button class="btn-freq" id="btnUp">+</button>
    </div>

    <canvas id="waveCanvas"></canvas>

    <button class="ptt-btn" id="pttBtn">PTT</button>
    
    <div class="status" id="statusLabel">Standby. Conectando a la red...</div>
</div>

<!-- Usamos Type Module para importar Firebase -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ==========================================
    // 1. CONFIGURACIÓN FIREBASE 
    // ==========================================
    let firebaseConfig;
    let isCanvas = false;
    let appId = "walkietalkie-global";

    try {
        // Modo simulador
        firebaseConfig = JSON.parse(__firebase_config);
        if (typeof __app_id !== 'undefined') appId = __app_id;
        isCanvas = true;
    } catch (e) {
        // 🔴 MODO GITHUB: Tu configuración de Firebase
        firebaseConfig = {
            apiKey: "AIzaSyAZJndi8_0x2_HQLcMQF-oxhoRLDr4izIc",
            authDomain: "webwalkietalk.firebaseapp.com",
            projectId: "webwalkietalk",
            storageBucket: "webwalkietalk.firebasestorage.app",
            messagingSenderId: "148022173413",
            appId: "1:148022173413:web:fdf109271f8d7ce06efe0c"
        };
    }

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let messagesRef, usersRef;

    // Ajuste de colecciones (simplificado para tu proyecto personal)
    if (isCanvas) {
        messagesRef = collection(db, 'artifacts', appId, 'public', 'data', 'walkie_messages');
        usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'walkie_users');
    } else {
        messagesRef = collection(db, 'walkie_messages');
        usersRef = collection(db, 'walkie_users');
    }

    let myUserId = "";
    const appStartTime = Date.now();

    // ==========================================
    // 2. VARIABLES DE AUDIO Y APP
    // ==========================================
    let currentFreq = 462.550;
    let isTransmitting = false;
    let isReceiving = false;
    
    // Audio API
    let audioCtx, analyser, microphone;
    let mediaRecorder;
    let audioChunks = [];
    let animationId;

    const freqLabel = document.getElementById('freqLabel');
    const pttBtn = document.getElementById('pttBtn');
    const statusLabel = document.getElementById('statusLabel');
    const usersLabel = document.getElementById('usersLabel');
    const canvas = document.getElementById('waveCanvas');
    const canvasCtx = canvas.getContext('2d');
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;

    // ==========================================
    // 3. INICIO DE SESIÓN Y RADAR DE USUARIOS
    // ==========================================
    const initAuth = async () => {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch (error) {
            console.error("Error de Auth:", error);
            statusLabel.innerText = "Error conectando al servidor.";
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            myUserId = user.uid;
            statusLabel.innerText = "Conectado. Presiona PTT para hablar.";
            startUserPing();
            listenToMessages();
            listenToUsers();
        }
    });

    function startUserPing() {
        const updatePresence = () => {
            if(!myUserId) return;
            setDoc(doc(usersRef, myUserId), {
                freq: currentFreq,
                lastPing: Date.now()
            });
        };
        updatePresence();
        setInterval(updatePresence, 5000); 
    }

    function listenToUsers() {
        onSnapshot(usersRef, (snapshot) => {
            const now = Date.now();
            let activeCount = 0;
            
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                if (data.freq === currentFreq && (now - data.lastPing) < 15000) {
                    activeCount++;
                }
            });

            usersLabel.innerText = `${activeCount} online en este canal`;
        }, (error) => console.error("Error usuarios:", error));
    }

    // ==========================================
    // 4. TRANSMISIÓN DE AUDIO (TX)
    // ==========================================
    async function startRecording() {
        if (isReceiving) return; 

        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            microphone = audioCtx.createMediaStreamSource(stream);
            microphone.connect(analyser);
            
            audioChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) audioChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = () => {
                    const base64Audio = reader.result;
                    addDoc(messagesRef, {
                        userId: myUserId,
                        freq: currentFreq,
                        audio: base64Audio,
                        timestamp: Date.now()
                    });
                };
            };

            mediaRecorder.start();
            isTransmitting = true;
            
            pttBtn.classList.add('tx-active');
            pttBtn.innerText = "TX";
            statusLabel.innerText = "Emitiendo voz a la red...";
            statusLabel.style.color = "#ff3232";
            
            drawWaveTX(); 
            
        } catch (err) {
            alert("Error: Para transmitir debes dar permiso de micrófono (Requiere HTTPS).");
            console.error(err);
        }
    }

    function stopRecording() {
        if (!isTransmitting) return;
        isTransmitting = false;
        
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
        }
        
        if (microphone) {
            microphone.disconnect();
            microphone.mediaStream.getTracks().forEach(track => track.stop());
        }

        pttBtn.classList.remove('tx-active');
        pttBtn.innerText = "PTT";
        statusLabel.innerText = "Mensaje enviado.";
        statusLabel.style.color = "#D3D4CB";
        
        cancelAnimationFrame(animationId);
        drawFlatLine();
        
        setTimeout(() => { if(!isTransmitting && !isReceiving) statusLabel.innerText = "Standby."; }, 2000);
    }

    // ==========================================
    // 5. RECEPCIÓN DE AUDIO (RX)
    // ==========================================
    function listenToMessages() {
        onSnapshot(messagesRef, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === 'added') {
                    const msg = change.doc.data();
                    
                    if (msg.timestamp > appStartTime && msg.freq === currentFreq && msg.userId !== myUserId) {
                        playIncomingAudio(msg.audio);
                    }
                }
            });
        }, (error) => console.error("Error mensajes:", error));
    }

    function playIncomingAudio(base64Data) {
        if (isTransmitting) return; 

        isReceiving = true;
        pttBtn.classList.add('rx-active');
        pttBtn.innerText = "RX";
        statusLabel.innerText = "Recibiendo transmisión...";
        statusLabel.style.color = "#32ff32";

        const audio = new Audio(base64Data);
        audio.play().catch(e => console.error("Autoplay bloqueado:", e));

        drawWaveRX(); 

        audio.onended = () => {
            isReceiving = false;
            pttBtn.classList.remove('rx-active');
            pttBtn.innerText = "PTT";
            statusLabel.innerText = "Standby.";
            statusLabel.style.color = "#D3D4CB";
            cancelAnimationFrame(animationId);
            drawFlatLine();
        };
    }

    // ==========================================
    // 6. EVENTOS DE INTERFAZ
    // ==========================================
    const updateFreq = () => {
        freqLabel.innerText = currentFreq.toFixed(3) + " MHz";
        if(myUserId) setDoc(doc(usersRef, myUserId), { freq: currentFreq, lastPing: Date.now() });
    };

    document.getElementById('btnDown').addEventListener('click', () => { currentFreq -= 0.025; updateFreq(); });
    document.getElementById('btnUp').addEventListener('click', () => { currentFreq += 0.025; updateFreq(); });

    pttBtn.addEventListener('mousedown', startRecording);
    pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });

    pttBtn.addEventListener('mouseup', stopRecording);
    pttBtn.addEventListener('mouseleave', () => { if(isTransmitting) stopRecording(); });
    pttBtn.addEventListener('touchend', stopRecording);

    // ==========================================
    // 7. MOTOR GRÁFICO DEL OSCILOSCOPIO
    // ==========================================
    function drawWaveTX() {
        if (!isTransmitting) return;
        animationId = requestAnimationFrame(drawWaveTX);

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteTimeDomainData(dataArray);

        canvasCtx.fillStyle = '#0A0F05';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        
        canvasCtx.lineWidth = 3;
        canvasCtx.strokeStyle = '#ff3232'; 
        canvasCtx.beginPath();

        const sliceWidth = canvas.width * 1.0 / bufferLength;
        let x = 0;

        for (let i = 0; i < bufferLength; i++) {
            const v = dataArray[i] / 128.0; 
            const y = v * canvas.height / 2;
            if (i === 0) canvasCtx.moveTo(x, y);
            else canvasCtx.lineTo(x, y);
            x += sliceWidth;
        }
        canvasCtx.lineTo(canvas.width, canvas.height / 2);
        canvasCtx.stroke();
    }

    function drawWaveRX() {
        if (!isReceiving) return;
        animationId = requestAnimationFrame(drawWaveRX);

        canvasCtx.fillStyle = '#0A0F05';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        
        canvasCtx.lineWidth = 3;
        canvasCtx.strokeStyle = '#32ff32'; 
        canvasCtx.beginPath();

        let x = 0;
        const time = Date.now() / 150;
        
        for (let i = 0; i < canvas.width; i += 4) {
            const amplitude = Math.random() * 25 + 5; 
            const y = (canvas.height / 2) + (Math.sin((i * 0.1) + time) * amplitude * Math.sin(i * 0.05));
            if (i === 0) canvasCtx.moveTo(x, y);
            else canvasCtx.lineTo(x, y);
            x += 4;
        }
        canvasCtx.stroke();
    }

    function drawFlatLine() {
        canvasCtx.fillStyle = '#0A0F05';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.lineWidth = 2;
        canvasCtx.strokeStyle = '#555';
        canvasCtx.beginPath();
        canvasCtx.moveTo(0, canvas.height / 2);
        canvasCtx.lineTo(canvas.width, canvas.height / 2);
        canvasCtx.stroke();
    }

    drawFlatLine();
    initAuth(); 

</script>

</body>
</html>
