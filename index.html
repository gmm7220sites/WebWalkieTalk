<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NaN0Hornet WebComms</title>
    <style>
        body {
            background-color: #151A02;
            color: #D5DE10;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .container {
            background-color: #23280F;
            border: 2px solid #D5DE10;
            border-radius: 15px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 15px rgba(213, 222, 16, 0.2);
        }

        h2 { margin-top: 0; border-bottom: 1px solid #D5DE10; padding-bottom: 10px; }

        .freq-control {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            background: #111;
            padding: 10px;
            border-radius: 10px;
        }

        .btn-freq {
            background-color: #444;
            color: #D5DE10;
            border: none;
            border-radius: 5px;
            width: 40px;
            height: 40px;
            font-size: 24px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-freq:active { background-color: #D5DE10; color: #111; }

        .freq-display {
            font-size: 28px;
            color: #32ffff;
            margin: 0 15px;
            font-weight: bold;
        }

        .users-badge {
            background-color: #32ffff;
            color: #111;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            display: inline-block;
        }

        canvas {
            width: 100%;
            height: 100px;
            background-color: #0A0F05;
            border-radius: 8px;
            border: 1px solid #555;
            margin-bottom: 20px;
        }

        .ptt-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #444;
            border: 4px solid #D5DE10;
            color: #D5DE10;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            transition: all 0.1s ease;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        .ptt-btn.tx-active {
            background-color: #ff3232;
            border-color: #ff9696;
            color: white;
            box-shadow: 0 0 20px rgba(255, 50, 50, 0.8), inset 0 0 20px rgba(0,0,0,0.5);
        }

        .ptt-btn.rx-active {
            background-color: #32ff32;
            border-color: #96ff96;
            color: #000;
            box-shadow: 0 0 20px rgba(50, 255, 50, 0.8), inset 0 0 20px rgba(0,0,0,0.5);
        }
        
        .ptt-btn.disabled {
            background-color: #222;
            border-color: #555;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        .status { margin-top: 15px; font-size: 14px; color: #D3D4CB; }
    </style>
</head>
<body>

<div class="container">
    <h2>WebComms Global</h2>
    
    <div class="users-badge" id="usersLabel">Buscando usuarios...</div>

    <div class="freq-control">
        <button class="btn-freq" id="btnDown">-</button>
        <div class="freq-display" id="freqLabel">462.55 MHz</div>
        <button class="btn-freq" id="btnUp">+</button>
    </div>

    <canvas id="waveCanvas"></canvas>

    <button class="ptt-btn" id="pttBtn">PTT</button>
    
    <div class="status" id="statusLabel">Standby. Conectando a la red...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ==========================================
    // 1. CONFIGURACIÓN FIREBASE (Tus datos)
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyAZJndi8_0x2_HQLcMQF-oxhoRLDr4izIc",
        authDomain: "webwalkietalk.firebaseapp.com",
        projectId: "webwalkietalk",
        storageBucket: "webwalkietalk.firebasestorage.app",
        messagingSenderId: "148022173413",
        appId: "1:148022173413:web:fdf109271f8d7ce06efe0c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const usersRef = collection(db, 'walkie_users');
    let myUserId = "";
    const appStartTime = Date.now();
    let currentUnsubscribe = null;

    // ==========================================
    // 2. VARIABLES DE AUDIO (PCM RAW COMPATIBLE CON ESP32)
    // ==========================================
    let currentFreq = 462.55;
    let isTransmitting = false;
    let isReceiving = false;
    let isSendingData = false;
    
    let audioCtx, analyser, microphone, processor;
    let pcmData = [];
    let animationId;
    let lastPlayedTimestamp = 0;

    const freqLabel = document.getElementById('freqLabel');
    const pttBtn = document.getElementById('pttBtn');
    const statusLabel = document.getElementById('statusLabel');
    const usersLabel = document.getElementById('usersLabel');
    const canvas = document.getElementById('waveCanvas');
    const canvasCtx = canvas.getContext('2d');
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;

    // ==========================================
    // 3. INICIO DE SESIÓN
    // ==========================================
    const initAuth = async () => {
        try {
            await signInAnonymously(auth);
        } catch (error) {
            statusLabel.innerText = "Error conectando al servidor.";
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            myUserId = user.uid;
            statusLabel.innerText = "Conectado. Presiona PTT para hablar.";
            startUserPing();
            listenToChannel();
            listenToUsers();
        }
    });

    function startUserPing() {
        const updatePresence = () => {
            if(!myUserId) return;
            setDoc(doc(usersRef, myUserId), { freq: currentFreq, lastPing: Date.now() });
        };
        updatePresence();
        setInterval(updatePresence, 5000); 
    }

    function listenToUsers() {
        onSnapshot(usersRef, (snapshot) => {
            const now = Date.now();
            let activeCount = 0;
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                if (data.freq === currentFreq && (now - data.lastPing) < 15000) activeCount++;
            });
            usersLabel.innerText = `${activeCount} online en este canal`;
        });
    }

    function listenToChannel() {
        if (currentUnsubscribe) currentUnsubscribe();
        
        let channelId = 'ch_' + currentFreq.toString().replace('.', '_');
        currentUnsubscribe = onSnapshot(doc(db, 'walkie_channels', channelId), (docSnap) => {
            if(docSnap.exists()) {
                const msg = docSnap.data();
                // Solo reproduce si es nuevo y no es nuestro propio mensaje
                if(msg.timestamp !== lastPlayedTimestamp && msg.userId !== myUserId && msg.timestamp > appStartTime) {
                    lastPlayedTimestamp = msg.timestamp;
                    playIncomingPCM(msg.audio);
                }
            }
        });
    }

    // ==========================================
    // 4. TRANSMISIÓN DE AUDIO (PCM RAW)
    // ==========================================
    async function initMicrophone() {
        if (processor) return true;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 16000});
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            
            microphone = audioCtx.createMediaStreamSource(stream);
            microphone.connect(analyser);

            // Procesador para obtener audio matematico en crudo
            processor = audioCtx.createScriptProcessor(4096, 1, 1);
            microphone.connect(processor);
            processor.connect(audioCtx.destination); // Necesario para Chrome

            processor.onaudioprocess = function(e) {
                if(!isTransmitting) return;
                // Límite de 3 segundos (48000 muestras a 16kHz) para proteger la RAM del ESP32
                if(pcmData.length >= 48000) { stopRecording(); return; } 

                const inputData = e.inputBuffer.getChannelData(0);
                for(let i=0; i<inputData.length; i++) {
                    let s = Math.max(-1, Math.min(1, inputData[i]));
                    let val = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    pcmData.push(val & 0xFF);
                    pcmData.push((val >> 8) & 0xFF);
                }
            };
            return true;
        } catch (err) {
            alert("Debes permitir el micrófono.");
            return false;
        }
    }

    async function startRecording(e) {
        if (e) e.preventDefault();
        if (isReceiving || isSendingData || isTransmitting) return; 

        if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();

        const micReady = await initMicrophone();
        if (!micReady) return;

        pcmData = [];
        isTransmitting = true;
        
        pttBtn.classList.add('tx-active');
        pttBtn.innerText = "TX";
        statusLabel.innerText = "Emitiendo... (Max 3s)";
        statusLabel.style.color = "#ff3232";
        drawWaveTX(); 
    }

    function stopRecording(e) {
        if (e) e.preventDefault();
        if (!isTransmitting) return;
        
        isTransmitting = false;
        pttBtn.classList.remove('tx-active');
        pttBtn.classList.add('disabled');
        statusLabel.innerText = "Enviando paquete a satélite...";
        statusLabel.style.color = "#D5DE10";
        cancelAnimationFrame(animationId);
        drawFlatLine();

        isSendingData = true;

        // Convertir PCM crudo a Base64 rápido
        let binary = '';
        const bytes = new Uint8Array(pcmData);
        for(let i=0; i<bytes.byteLength; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        const base64Audio = window.btoa(binary);

        let channelId = 'ch_' + currentFreq.toString().replace('.', '_');
        let ts = Date.now();
        lastPlayedTimestamp = ts; // Para no auto-reproducirnos

        setDoc(doc(db, 'walkie_channels', channelId), {
            userId: myUserId,
            freq: currentFreq,
            audio: base64Audio,
            timestamp: ts
        }).then(() => {
            isSendingData = false;
            pttBtn.classList.remove('disabled');
            statusLabel.style.color = "#D3D4CB";
            statusLabel.innerText = "Standby.";
        });
    }

    // ==========================================
    // 5. RECEPCIÓN DE AUDIO (PCM RAW)
    // ==========================================
    function base64ToFloat32Array(base64) {
        let binary = window.atob(base64);
        let len = binary.length;
        let bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
        
        let floatArray = new Float32Array(len / 2);
        for(let i=0; i<len/2; i++) {
            let low = bytes[i*2];
            let high = bytes[i*2+1];
            let sample = (high << 8) | low;
            if (sample >= 0x8000) sample -= 0x10000;
            floatArray[i] = sample / 32768.0;
        }
        return floatArray;
    }

    function playIncomingPCM(base64Data) {
        if (isTransmitting || isSendingData) return; 

        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 16000});
        if (audioCtx.state === 'suspended') audioCtx.resume();

        isReceiving = true;
        pttBtn.classList.add('rx-active');
        pttBtn.innerText = "RX";
        statusLabel.innerText = "Recibiendo transmisión...";
        statusLabel.style.color = "#32ff32";

        try {
            let floatArray = base64ToFloat32Array(base64Data);
            let audioBuffer = audioCtx.createBuffer(1, floatArray.length, 16000);
            audioBuffer.getChannelData(0).set(floatArray);

            let source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioCtx.destination);
            
            drawWaveRX(); 

            source.onended = () => {
                isReceiving = false;
                pttBtn.classList.remove('rx-active');
                pttBtn.innerText = "PTT";
                statusLabel.innerText = "Standby.";
                statusLabel.style.color = "#D3D4CB";
                cancelAnimationFrame(animationId);
                drawFlatLine();
            };
            source.start();
        } catch(e) {
            console.error("Error decodificando PCM", e);
            isReceiving = false;
        }
    }

    // ==========================================
    // 6. EVENTOS DE INTERFAZ
    // ==========================================
    const updateFreq = () => {
        freqLabel.innerText = currentFreq.toFixed(2) + " MHz";
        listenToChannel(); // Cambiar de sala en Firebase
        if(myUserId) setDoc(doc(usersRef, myUserId), { freq: currentFreq, lastPing: Date.now() });
    };

    document.getElementById('btnDown').addEventListener('click', () => { currentFreq -= 0.05; updateFreq(); });
    document.getElementById('btnUp').addEventListener('click', () => { currentFreq += 0.05; updateFreq(); });

    pttBtn.addEventListener('mousedown', startRecording);
    pttBtn.addEventListener('touchstart', startRecording, {passive: false});

    window.addEventListener('mouseup', stopRecording);
    pttBtn.addEventListener('touchend', stopRecording, {passive: false});
    pttBtn.addEventListener('touchcancel', stopRecording, {passive: false});

    // ==========================================
    // 7. MOTOR GRÁFICO DEL OSCILOSCOPIO
    // ==========================================
    function drawWaveTX() {
        if (!isTransmitting) return;
        animationId = requestAnimationFrame(drawWaveTX);
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteTimeDomainData(dataArray);

        canvasCtx.fillStyle = '#0A0F05';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.lineWidth = 3; canvasCtx.strokeStyle = '#ff3232'; canvasCtx.beginPath();
        let x = 0; const sliceWidth = canvas.width * 1.0 / bufferLength;

        for (let i = 0; i < bufferLength; i++) {
            const v = dataArray[i] / 128.0; 
            const y = v * canvas.height / 2;
            if (i === 0) canvasCtx.moveTo(x, y); else canvasCtx.lineTo(x, y);
            x += sliceWidth;
        }
        canvasCtx.lineTo(canvas.width, canvas.height / 2); canvasCtx.stroke();
    }

    function drawWaveRX() {
        if (!isReceiving) return;
        animationId = requestAnimationFrame(drawWaveRX);
        canvasCtx.fillStyle = '#0A0F05';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.lineWidth = 3; canvasCtx.strokeStyle = '#32ff32'; canvasCtx.beginPath();

        let x = 0; const time = Date.now() / 150;
        for (let i = 0; i < canvas.width; i += 4) {
            const amplitude = Math.random() * 25 + 5; 
            const y = (canvas.height / 2) + (Math.sin((i * 0.1) + time) * amplitude * Math.sin(i * 0.05));
            if (i === 0) canvasCtx.moveTo(x, y); else canvasCtx.lineTo(x, y);
            x += 4;
        }
        canvasCtx.stroke();
    }

    function drawFlatLine() {
        canvasCtx.fillStyle = '#0A0F05';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.lineWidth = 2; canvasCtx.strokeStyle = '#555'; canvasCtx.beginPath();
        canvasCtx.moveTo(0, canvas.height / 2); canvasCtx.lineTo(canvas.width, canvas.height / 2);
        canvasCtx.stroke();
    }

    drawFlatLine();
    initAuth(); 

</script>

</body>
</html>
