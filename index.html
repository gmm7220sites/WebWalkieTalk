<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NaN0Hornet WebComms</title>
    <style>
        body {
            background-color: #151A02;
            color: #D5DE10;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .container {
            background-color: #23280F;
            border: 2px solid #D5DE10;
            border-radius: 15px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 15px rgba(213, 222, 16, 0.2);
        }

        h2 { margin-top: 0; border-bottom: 1px solid #D5DE10; padding-bottom: 10px; }

        .freq-control {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            background: #111;
            padding: 10px;
            border-radius: 10px;
        }

        .btn-freq {
            background-color: #444;
            color: #D5DE10;
            border: none;
            border-radius: 5px;
            width: 40px;
            height: 40px;
            font-size: 24px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-freq:active { background-color: #D5DE10; color: #111; }

        .freq-display {
            font-size: 28px;
            color: #32ffff;
            margin: 0 15px;
            font-weight: bold;
        }

        canvas {
            width: 100%;
            height: 100px;
            background-color: #0A0F05;
            border-radius: 8px;
            border: 1px solid #555;
            margin-bottom: 20px;
        }

        .ptt-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #444;
            border: 4px solid #D5DE10;
            color: #D5DE10;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            transition: all 0.1s ease;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        .ptt-btn.active {
            background-color: #ff3232;
            border-color: #ff9696;
            color: white;
            box-shadow: 0 0 20px rgba(255, 50, 50, 0.8), inset 0 0 20px rgba(0,0,0,0.5);
        }

        .status { margin-top: 15px; font-size: 14px; color: #D3D4CB; }
    </style>
</head>
<body>

<div class="container">
    <h2>Web Walkie-Talkie</h2>
    
    <div class="freq-control">
        <button class="btn-freq" id="btnDown">-</button>
        <div class="freq-display" id="freqLabel">462.550 MHz</div>
        <button class="btn-freq" id="btnUp">+</button>
    </div>

    <!-- Osciloscopio Web -->
    <canvas id="waveCanvas"></canvas>

    <button class="ptt-btn" id="pttBtn">PTT</button>
    
    <div class="status" id="statusLabel">Standby. Presiona PTT para hablar.</div>
</div>

<script>
    // Variables de Audio Web
    let audioCtx;
    let analyser;
    let microphone;
    let jsNode;
    let isTransmitting = false;
    let currentFreq = 462.550;
    let animationId;

    // Elementos del DOM
    const freqLabel = document.getElementById('freqLabel');
    const pttBtn = document.getElementById('pttBtn');
    const statusLabel = document.getElementById('statusLabel');
    const canvas = document.getElementById('waveCanvas');
    const canvasCtx = canvas.getContext('2d');

    // Ajustar el Canvas
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;

    // Control de Frecuencia
    document.getElementById('btnDown').addEventListener('click', () => {
        currentFreq -= 0.025;
        freqLabel.innerText = currentFreq.toFixed(3) + " MHz";
    });
    
    document.getElementById('btnUp').addEventListener('click', () => {
        currentFreq += 0.025;
        freqLabel.innerText = currentFreq.toFixed(3) + " MHz";
    });

    // Iniciar el Contexto de Audio y pedir permiso de micrófono
    async function startAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            
            microphone = audioCtx.createMediaStreamSource(stream);
            microphone.connect(analyser);
            
            isTransmitting = true;
            pttBtn.classList.add('active');
            pttBtn.innerText = "TX";
            statusLabel.innerText = "Transmitiendo audio (" + currentFreq.toFixed(3) + " MHz)...";
            statusLabel.style.color = "#ff3232";
            
            drawWave(); // Iniciar animación
            
            // En una App Real (Fase 2): Aquí iniciarías un WebSocket o WebRTC 
            // enviando los datos del "stream" hacia el servidor ESP32.
            
        } catch (err) {
            alert("Error: Debes dar permiso al micrófono. Nota: Los navegadores requieren HTTPS o localhost para usar micrófonos.");
            console.error(err);
        }
    }

    // Detener la transmisión
    function stopAudio() {
        isTransmitting = false;
        pttBtn.classList.remove('active');
        pttBtn.innerText = "PTT";
        statusLabel.innerText = "Standby. Presiona PTT para hablar.";
        statusLabel.style.color = "#D3D4CB";
        
        if (microphone) {
            microphone.disconnect();
            microphone.mediaStream.getTracks().forEach(track => track.stop());
        }
        cancelAnimationFrame(animationId);
        drawFlatLine(); // Volver a linea plana
    }

    // Lógica del Botón PTT (Mouse y Táctil para móviles)
    pttBtn.addEventListener('mousedown', startAudio);
    pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startAudio(); });

    pttBtn.addEventListener('mouseup', stopAudio);
    pttBtn.addEventListener('mouseleave', () => { if(isTransmitting) stopAudio(); });
    pttBtn.addEventListener('touchend', stopAudio);

    // Dibujar Osciloscopio Animado
    function drawWave() {
        if (!isTransmitting) return;

        animationId = requestAnimationFrame(drawWave);

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteTimeDomainData(dataArray);

        canvasCtx.fillStyle = '#0A0F05';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        
        canvasCtx.lineWidth = 3;
        canvasCtx.strokeStyle = '#ff3232'; // Rojo transmisión
        canvasCtx.beginPath();

        const sliceWidth = canvas.width * 1.0 / bufferLength;
        let x = 0;

        for (let i = 0; i < bufferLength; i++) {
            const v = dataArray[i] / 128.0; // Rango de 0 a 2 (centro 1)
            const y = v * canvas.height / 2;

            if (i === 0) canvasCtx.moveTo(x, y);
            else canvasCtx.lineTo(x, y);
            x += sliceWidth;
        }

        canvasCtx.lineTo(canvas.width, canvas.height / 2);
        canvasCtx.stroke();
    }

    // Dibujar Línea Plana (Standby)
    function drawFlatLine() {
        canvasCtx.fillStyle = '#0A0F05';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.lineWidth = 2;
        canvasCtx.strokeStyle = '#555';
        canvasCtx.beginPath();
        canvasCtx.moveTo(0, canvas.height / 2);
        canvasCtx.lineTo(canvas.width, canvas.height / 2);
        canvasCtx.stroke();
    }

    // Dibujar línea plana al cargar la página
    drawFlatLine();
</script>

</body>
</html>
